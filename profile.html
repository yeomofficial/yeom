<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YEOM · Profile</title>
  <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="stylesheet" href="profile.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json">
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("./service-worker.js")
        .then(() => {
          console.log("Service Worker registered");
        })
        .catch((err) => {
          console.log("SW failed", err);
        });
    });
  }
  </script>
</head>
<body>

  <header>
    <img src="yeom_img.png" class="header-img">
    <a href="../settings/settings.html">
      <img class="settings-img" src="setting.png">
    </a>
  </header>

  <section class="profile-section">
    <div class="profile-header">

      <img
        id="profileImage"
        class="main-profile-img"
        src="person.png"
        alt="Profile Picture"
      >
      <p id="loggedInUsername"></p>

      <button id="spotButton" style="display: none;">Spot</button>

      <a href="edit-profile.html">
        <button id="editProfileBtn">Edit Profile</button>
      </a>

      <div class="counts">
        <div>
          <span class="count-number">0</span><br>Posts
        </div>
        <div>
          <span id="spottersCount" class="count-number">0</span><br>Spotters
        </div>
        <div>
          <span id="spottingCount" class="count-number">0</span><br>Spotting
        </div>
      </div>
    </div>
    <div class="profile-divider"></div>

    <div class="user-posts" id="userPosts">
      <div class="posts-grid" id="postsGrid"></div>
      <h2 class="empty-title">No fits yet</h2>
      <p class="empty-sub">Drop your first look</p>
    </div>
  </section>

  <!-- ================= BOTTOM NAV ================= -->
  <nav class="bottom-nav">
    <ul>
      <li>
        <a href="home.html">
          <img src="home.png" alt="Home" />
        </a>
      </li>

      <li>
        <a href="search.html">
          <img src="search.png" alt="Search" />
        </a>
      </li>

      <li>
        <a href="lumi_questions.html">
          <img src="yeom_ai.png" alt="Lumi AI" />
        </a>
      </li>

      <li>
        <a href="upload.html">
          <img src="upload.png" alt="Upload" />
        </a>
      </li>

      <li>
        <a href="profile.html">
          <img src="profile.png" alt="Profile" />
        </a>
      </li>
    </ul>
  </nav>

  <input type="file" id="fileInput" accept="image/*" style="display: none;">

  <script type="module" src="profile.js"></script>
  
  

</body>
</html>
