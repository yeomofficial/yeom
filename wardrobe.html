<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YEOM · My Wardrobe</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="stylesheet" href="wardrobe.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <header class="main-header">
      <div class="header-top-minimal">
        <a href="mywardrobe.html" class="wardrobe-circle-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.62 1.96V17a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V5.42a2 2 0 0 0-1.62-1.96Z"/></svg>
        </a>
      </div>

      <div class="title-group-centered">
        <h1>My Wardrobe</h1>
        <p class="subtitle">Add clothes you own</p>
      </div>
      
      <div class="header-sticky">
      <div class="search-section-minimal">
        <div class="unified-search-bar">
          <svg class="search-icon-left" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" placeholder="Search clothes...">
          <div class="search-divider"></div>
          <button id="filterBtnInside" class="search-filter-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="4" x2="14" y2="4"></line><line x1="10" y1="4" x2="3" y2="4"></line><line x1="21" y1="12" x2="12" y2="12"></line><line x1="8" y1="12" x2="3" y2="12"></line><line x1="21" y1="20" x2="16" y2="20"></line><line x1="12" y1="20" x2="3" y2="20"></line><circle cx="14" cy="4" r="2"></circle><circle cx="8" cy="12" r="2"></circle><circle cx="16" cy="20" r="2"></circle></svg>
          </button>
        </div>
      </div>
      </div>

      <div class="action-bar-minimal" style="border-bottom: 1px solid #e5e7eb; padding-bottom: 14px;">
        <div class="filter-pills-minimal" id="genderFilters">
          <button class="filter-pill active" data-gender="all">All</button>
          <button class="filter-pill" data-gender="men">Men</button>
          <button class="filter-pill" data-gender="women">Women</button>
        </div>
        <button id="sortBtn" class="sort-icon-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>
        </button>
      </div>
    </header>
    
    <main class="content-area">
      <section class="clothes-section">
        <div class="section-header">
          <h3>Choose Your clothes</h3>
          <span id="itemCount" class="badge">0 Items</span>
        </div>
        <div id="clothesContainer" class="clothes-grid">
        </div>
      </section>
    </main>

    <div id="filterOverlay" class="overlay">
      <div class="overlay-content bottom-sheet filter-sheet">
        <div class="sheet-handle"></div>
        <header class="overlay-header-minimal">
          <h2>Filters</h2>
          <button class="close-overlay icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </header>
        
        <div class="filter-groups">
          <div class="filter-group">
            <h5>Category</h5>
            <div class="filter-options style-pills" id="categoryFilters">
              <button class="filter-chip active" data-category="all"><strong>All</strong></button>
              <button class="filter-chip" data-category="tops">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
                Tops
              </button>
              <button class="filter-chip" data-category="bottoms">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12l-1 16h-4l-1-8-1 8H7z"/></svg>
                Bottoms
              </button>
              <button class="filter-chip" data-category="footwear">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"></path><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"></path><path d="M16 17h4"></path><path d="M4 13h4"></path></svg>
                Footwear
              </button>
              <button class="filter-chip" data-category="others">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                Others
              </button>
            </div>
          </div>
          
          <div class="filter-divider"></div>

          <div class="filter-group">
            <h5>Color</h5>
            <div class="color-options" id="colorFilters">
              <button class="color-swatch active" data-color="black" style="background-color: #111111;"></button>
              <button class="color-swatch" data-color="white" style="background-color: #ffffff;"></button>
              <button class="color-swatch" data-color="gray" style="background-color: #9ca3af;"></button>
              <button class="color-swatch" data-color="navy" style="background-color: #1e3a5f;"></button>
              <button class="color-swatch" data-color="lightblue" style="background-color: #bfdbfe;"></button>
              <button class="color-swatch" data-color="beige" style="background-color: #d4c5b9;"></button>
              <button class="color-swatch" data-color="green" style="background-color: #3d5a1e;"></button>
              <button class="more-pill-btn" id="colorPickerTrigger">+ More</button>
              <input type="color" id="realColorPicker" value="#000000" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none;">
            </div>
          </div>
        </div>
        
        <div class="overlay-footer-minimal">
          <button id="resetFilters" class="btn-outline">Reset</button>
          <button id="applyFilters" class="btn-solid">Apply filters</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="wardrobe.js"></script>
</body>
</html>
