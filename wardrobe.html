<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YEOM · My Wardrobe</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="stylesheet" href="wardrobe.css">
</head>

<body>
  <header>
    <h2>My Wardrobe</h2>
    <a href="mywardrobe.html" class="mywardrobe-btn">
      <img src="mywardrobe.png" alt="My Wardrobe">
    </a>
    <p>Add clothes you own</p>
  </header>
  
  <section class="controls">
  <input
    type="text"
    id="searchInput"
    placeholder="Search clothes..."
  />
  <div class="filters">
    <button class="filter-btn active" data-gender="all">All</button>
    <button class="filter-btn" data-gender="men">Men</button>
    <button class="filter-btn" data-gender="women">Women</button>
  </div>
  </section>
  
  <section>
    <h3>Choose Your Clothes</h3>
    <div id="clothesContainer" class="grid"></div>
  </section>

  <script type="module" src="wardrobe.js"></script>
</body>
</html>
