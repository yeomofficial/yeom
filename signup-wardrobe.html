<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YEOM · Setup Wardrobe</title>
  <link rel="stylesheet" href="signup-wardrobe.css" />
</head>

<body>

  <div class="onboarding-header">
    <h2>Set Up Your Wardrobe</h2>
    <p>Add a few clothes so Lumi can style you</p>
  </div>

  <section class="controls">
  <input
    type="text"
    id="searchInput"
    placeholder="Search clothes..."
  />
  <div class="filters">
    <button class="filter-btn active" data-gender="all">All</button>
    <button class="filter-btn" data-gender="men">Men</button>
    <button class="filter-btn" data-gender="women">Women</button>
  </div>
  </section>
  
  <section>
    <div id="clothesContainer" class="grid"></div>
  </section>

  <div class="bottom-bar">
    <button id="continueBtn" disabled>
      Continue to YEOM
    </button>
  </div>

  <script type="module" src="signup-wardrobe.js"></script>
</body>
</html>
